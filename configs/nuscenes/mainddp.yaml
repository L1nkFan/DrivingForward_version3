ddp:
  ddp_enable: True
  world_size: 2
  gpus: [0,1]
  
model:
  # mode: 'MF' or 'SF'
  novel_view_mode: 'MF'

  num_layers: 18
  weights_init: True

  # Swin Transformer backbone
  swin_patch_size: 4
  swin_embed_dim: 96
  swin_depths: [2, 2, 6, 2]
  swin_num_heads: [3, 6, 12, 24]
  swin_window_size: 7
  swin_mlp_ratio: 4.0
  swin_drop_rate: 0.0
  swin_attn_drop_rate: 0.0
  swin_drop_path_rate: 0.1
  swin_patch_norm: True
  
  fusion_level: 2
  fusion_feat_in_dim: 256
  use_skips: False
  
  voxel_unit_size: [1.0, 1.0, 1.5] 
  voxel_size: [100, 100, 20] 
  voxel_str_p: [-50.0, -50.0, -15.0] 
  voxel_pre_dim: [64]
  proj_d_bins: 50
  proj_d_str: 2
  proj_d_end: 50

data:
  data_path: '/share/home/u21053/nuscenes'
  log_dir: './results_VIT/'
  dataset: 'nuscenes'
  back_context: 1
  forward_context: 1
  depth_type: 'lidar'
  cameras: ['CAM_FRONT', 'CAM_FRONT_LEFT', 'CAM_FRONT_RIGHT', 'CAM_BACK_LEFT', 'CAM_BACK_RIGHT', 'CAM_BACK']
  # gt_ego_pose, gt_depth is not used during training, only for visulization                                     
  train_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)
  val_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)

training:
  # basic
  height: 352
  width: 640
  scales: [0] 
  frame_ids: [0, -1, 1]
  
  # optimization
  batch_size: 1
  num_workers: 4
  learning_rate: 0.0001
  vit_learning_rate: 0.00001
  num_epochs: 10
  scheduler_step_size: 15

  # model / loss setting
  ## depth range
  min_depth: 1.5
  max_depth: 80.0

  ## spatio & temporal
  spatio: True
  spatio_temporal: True

  ## gaussian
  gaussian: True

  ## intensity align
  intensity_align: True
  
  ## focal length scaling
  focal_length_scale: 300

# Loss hyperparams
loss:
  disparity_smoothness: 0.001
  spatio_coeff: 0.03
  spatio_tempo_coeff: 0.1
  gaussian_coeff: 0.01
  pose_loss_coeff: 0.0
  
eval:
  eval_batch_size: 1
  eval_num_workers: 4
  eval_min_depth: 0
  eval_max_depth: 80
  eval_visualize: True
  save_images: True
  save_path: './results.VIT/images'
  
load:
  pretrain: False
  models_to_load: ['depth_net', 'gs_net']
  load_dir: './results_VIT/weights_MF'
  
logging:
  early_phase: 5000
  log_frequency: 1000
  late_log_frequency: 5000
  save_frequency: 1