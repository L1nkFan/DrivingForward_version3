ddp:
  ddp_enable: True
  world_size: 1
  gpus: [0]
  scale_lr: False

model:
  novel_view_mode: 'MF'

  num_layers: 18
  weights_init: True

  # Swin Transformer backbone
  swin_patch_size: 4
  swin_embed_dim: 96
  swin_depths: [2, 2, 6, 2]
  swin_num_heads: [3, 6, 12, 24]
  swin_window_size: 7
  swin_mlp_ratio: 4.0
  swin_drop_rate: 0.0
  swin_attn_drop_rate: 0.0
  swin_drop_path_rate: 0.1
  swin_patch_norm: True

  fusion_level: 2
  fusion_feat_in_dim: 256
  use_skips: False

  # Stage1 cross-view fusion switches
  enable_cross_view_fusion: True
  cross_view_num_heads: 4

  voxel_unit_size: [1.0, 1.0, 1.5]
  voxel_size: [100, 100, 20]
  voxel_str_p: [-50.0, -50.0, -15.0]
  voxel_pre_dim: [64]
  proj_d_bins: 50
  proj_d_str: 2
  proj_d_end: 50

data:
  data_path: '/share/home/u21053/nuscenes'
  log_dir: './results_stage1_crossview_debug_1gpu_v1/'
  dataset: 'nuscenes'
  back_context: 1
  forward_context: 1
  depth_type: 'lidar'
  cameras: ['CAM_FRONT', 'CAM_FRONT_LEFT', 'CAM_FRONT_RIGHT', 'CAM_BACK_LEFT', 'CAM_BACK_RIGHT', 'CAM_BACK']
  train_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)
  val_requirements: (gt_pose, gt_ego_pose, gt_depth, mask)

training:
  height: 352
  width: 640
  scales: [0]
  frame_ids: [0, -1, 1]

  batch_size: 1
  num_workers: 2
  learning_rate: 0.00008
  vit_learning_rate: 0.000008
  num_epochs: 2
  scheduler_step_size: 8

  min_depth: 1.5
  max_depth: 80.0

  spatio: True
  spatio_temporal: True

  gaussian: True
  intensity_align: True
  focal_length_scale: 300

loss:
  disparity_smoothness: 0.001
  spatio_coeff: 0.03
  spatio_tempo_coeff: 0.1
  gaussian_coeff: 0.01
  pose_loss_coeff: 0.0

eval:
  eval_batch_size: 1
  eval_num_workers: 2
  eval_min_depth: 0
  eval_max_depth: 80
  eval_visualize: False
  save_images: False
  save_path: './results_stage1_crossview_debug_1gpu_v1/images'

load:
  pretrain: True
  models_to_load: ['pose_net', 'depth_net', 'gs_net']
  load_weights_dir: './weight/weights_MF'

logging:
  early_phase: 5000
  log_frequency: 500
  late_log_frequency: 2000
  save_frequency: 1
